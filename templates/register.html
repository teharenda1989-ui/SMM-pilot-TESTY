{% extends "base.html" %}

{% block title %}Регистрация — SMM Пилот{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 24px;">🚀 Регистрация</h2>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@mail.ru" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Минимум 6 символов" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Подтверждение пароля</label>
                <input type="password" name="password_confirm" class="form-control" placeholder="Повторите пароль" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">🕐 Ваш часовой пояс</label>
                <select name="timezone" class="form-control" id="timezone-select">
                    <option value="UTC">UTC</option>
                    <option value="Europe/Moscow">Москва (UTC+3)</option>
                    <option value="Europe/Volgograd">Волгоград (UTC+4)</option>
                    <option value="Asia/Yekaterinburg">Екатеринбург (UTC+5)</option>
                    <option value="Asia/Omsk">Омск (UTC+6)</option>
                    <option value="Asia/Novosibirsk" {% if detected_timezone == 'Asia/Novosibirsk' %}selected{% endif %}>Новосибирск (UTC+7)</option>
                    <option value="Asia/Krasnoyarsk" {% if detected_timezone == 'Asia/Krasnoyarsk' %}selected{% endif %}>Красноярск (UTC+7)</option>
                    <option value="Asia/Irkutsk" {% if detected_timezone == 'Asia/Irkutsk' %}selected{% endif %}>Иркутск (UTC+8)</option>
                    <option value="Asia/Yakutsk" {% if detected_timezone == 'Asia/Yakutsk' %}selected{% endif %}>Якутск (UTC+9)</option>
                    <option value="Asia/Vladivostok" {% if detected_timezone == 'Asia/Vladivostok' %}selected{% endif %}>Владивосток (UTC+10)</option>
                    <option value="Asia/Magadan" {% if detected_timezone == 'Asia/Magadan' %}selected{% endif %}>Магадан (UTC+11)</option>
                    <option value="Asia/Kamchatka" {% if detected_timezone == 'Asia/Kamchatka' %}selected{% endif %}>Камчатка (UTC+12)</option>
                </select>
                <small style="color: var(--text-secondary);">
                    🔍 Автоматически определён: <strong>{{ detected_timezone }}</strong>
                    <br>Если не совпадает — выберите вручную
                </small>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
        </form>
        
        <div style="text-align: center; margin-top: 16px; color: var(--text-secondary);">
            Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: var(--accent);">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
