{% extends "base.html" %}

{% block title %}Вход — SMM Пилот{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 24px;">🔐 Вход в систему</h2>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@mail.ru" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Ваш пароль" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
        </form>
        
        <div style="text-align: center; margin-top: 16px; color: var(--text-secondary);">
            Нет аккаунта? <a href="{{ url_for('register') }}" style="color: var(--accent);">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
